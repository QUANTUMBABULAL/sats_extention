<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel Sender</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0f172a;
        --bg-soft: #111827;
        --card: rgba(15, 23, 42, 0.86);
        --card-border: rgba(148, 163, 184, 0.18);
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-2: #22c55e;
        --danger: #fb7185;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 340px;
        min-height: 420px;
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.2), transparent 40%),
          linear-gradient(180deg, #0f172a 0%, #111827 100%);
        color: var(--text);
      }

      body {
        padding: 16px;
      }

      .panel {
        display: grid;
        gap: 14px;
        padding: 18px;
        border: 1px solid var(--card-border);
        border-radius: 20px;
        background: var(--card);
        backdrop-filter: blur(14px);
        box-shadow: 0 18px 50px rgba(2, 6, 23, 0.35);
      }

      .eyebrow {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
        font-size: 13px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 13px;
        color: var(--text);
      }

      input[type="file"] {
        width: 100%;
        padding: 12px;
        border: 1px dashed rgba(148, 163, 184, 0.35);
        border-radius: 14px;
        color: var(--muted);
        background: rgba(15, 23, 42, 0.5);
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        border: 0;
        border-radius: 14px;
        padding: 12px 14px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: transform 160ms ease, opacity 160ms ease, box-shadow 160ms ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .primary {
        color: #042f2e;
        background: linear-gradient(135deg, #67e8f9 0%, #34d399 100%);
        box-shadow: 0 12px 28px rgba(34, 197, 94, 0.24);
      }

      .secondary {
        color: var(--text);
        background: rgba(148, 163, 184, 0.12);
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .status {
        min-height: 58px;
        padding: 12px;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.46);
        border: 1px solid rgba(148, 163, 184, 0.14);
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .status.error {
        border-color: rgba(251, 113, 133, 0.35);
        color: #fecdd3;
      }

      .file-name {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(148, 163, 184, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.12);
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div>
        <p class="eyebrow">Excel upload</p>
        <h1>Automation panel</h1>
      </div>

      <p>Load an Excel file, then start automation on the active tab.</p>

      <input id="fileInput" type="file" accept=".xlsx" hidden />

      <div id="fileName" class="file-name">No file selected</div>

      <div class="actions">
        <button id="loadButton" class="secondary" type="button">Load Excel</button>
        <button id="startButton" class="primary" disabled>Start Automation</button>
      </div>

      <div id="status" class="status">Choose an Excel file to start.</div>
    </main>

    <script src="node_modules/xlsx/dist/xlsx.full.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
